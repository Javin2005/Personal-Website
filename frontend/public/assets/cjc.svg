<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="100%" height="100%">
  <!-- Definitions for gradients and styles -->
  <defs>
    <linearGradient id="tech-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <style>
      .bracket { font-family: 'Courier New', Courier, monospace; font-weight: bold; fill: #7928CA; font-size: 24px; }
      .initials { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: 800; fill: url(#tech-grad); font-size: 22px; letter-spacing: 1px; }
      .slash { font-family: 'Courier New', Courier, monospace; font-weight: bold; fill: #ff007f; font-size: 24px; }
    </style>
  </defs>

  <!-- Background (Optional: Transparent by default, uncomment if you want a dark tile) -->
  <!-- <rect width="200" height="50" rx="8" fill="#0d1117"/> -->

  <!-- Logo Content Centered Vertically -->
  <g transform="translate(15, 32)">
    <!-- Opening Bracket Code Syntax: < -->
    <text x="0" y="0" class="bracket">&lt;</text>
    
    <!-- Your Initials: cjc -->
    <text x="25" y="-2" class="initials">cjc</text>
    
    <!-- Closing Bracket Syntax: /> -->
    <text x="75" y="0" class="slash">/</text>
    <text x="90" y="0" class="bracket">&gt;</text>
  </g>
</svg>
